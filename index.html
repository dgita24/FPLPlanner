<!-- NOTE: Keep <!DOCTYPE html> exactly as-is (required). -->
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta content="width=device-width, initial-scale=1.0" name="viewport" />
<title>FPL Team Planner</title>
<style>
:root {
--primary: #00ff87;
--bg: #37003c;
--bg-dark: #2b0a2e;
--text: #fff;
}

* {
box-sizing: border-box;
margin: 0;
padding: 0;
}

body {
font-family: "Segoe UI", sans-serif;
background: var(--bg);
color: var(--text);
padding: 20px;
}

.container {
max-width: 1400px;
margin: 0 auto;
}

.header {
display: flex;
justify-content: flex-start;
align-items: center;
gap: 15px;
margin-bottom: 10px;
padding: 15px 20px;
background: rgba(255, 255, 255, 0.1);
border-radius: 10px;
}

.bank-display {
display: flex;
align-items: center;
gap: 5px;
font-size: 16px;
font-weight: bold;
}

.bank-display input {
width: 70px;
padding: 6px 8px;
border-radius: 5px;
border: none;
font-size: 15px;
font-weight: bold;
background: rgba(255, 255, 255, 0.9);
}

.price-toggle {
display: flex;
align-items: center;
gap: 4px;
font-size: 13px;
}

.price-toggle select {
padding: 4px 6px;
border-radius: 4px;
border: none;
font-size: 12px;
background: rgba(255, 255, 255, 0.9);
}

.header-actions {
display: flex;
gap: 8px;
}

.header-btn {
padding: 12px 20px;
border: none;
border-radius: 5px;
font-weight: bold;
font-size: 14px;
cursor: pointer;
transition: all 0.2s;
}

.save-btn {
background: #ff9800;
color: white;
}

.save-btn:hover {
background: #f57c00;
}

.load-btn {
background: #2196f3;
color: white;
}

.load-btn:hover {
background: #1976d2;
}

.sidebar-toggle {
padding: 10px 15px;
background: var(--primary);
color: var(--bg);
border: none;
border-radius: 5px;
cursor: pointer;
font-weight: bold;
margin-left: auto;
font-size: 14px;
white-space: nowrap;
transition: opacity 0.2s;
}

.sidebar-toggle:hover {
opacity: 0.9;
}

.sidebar {
position: fixed;
right: 0;
top: 0;
width: 320px;
height: 100vh;
background: var(--bg-dark);
padding: 70px 20px 20px;
box-shadow: -5px 0 15px rgba(0, 0, 0, 0.5);
transform: translateX(100%);
transition: transform 0.3s ease;
z-index: 1000;
overflow-y: auto;
}

.sidebar.open {
transform: translateX(0);
}

.sidebar h2 {
margin: 20px 0 10px;
color: var(--primary);
}

.sidebar h3 {
margin: 20px 0 10px;
color: var(--primary);
border-bottom: 1px solid rgba(255, 255, 255, 0.1);
padding-bottom: 5px;
}

.sidebar input {
width: 100%;
padding: 10px;
margin: 5px 0;
border-radius: 5px;
border: none;
background: rgba(255, 255, 255, 0.9);
}

.sidebar button {
width: 100%;
padding: 10px;
margin-top: 5px;
background: var(--primary);
border: none;
border-radius: 5px;
cursor: pointer;
font-weight: bold;
color: var(--bg);
}

.sidebar button:hover {
opacity: 0.9;
}

#sideMsg {
margin-top: 10px;
font-size: 12px;
}

.gw-nav {
display: flex;
justify-content: center;
align-items: center;
gap: 20px;
margin: 20px 0;
}

.gw-nav button {
padding: 8px 16px;
background: var(--primary);
border: none;
border-radius: 4px;
cursor: pointer;
font-weight: bold;
}

.gw-nav button:disabled {
background: #666;
cursor: not-allowed;
}

.pitch {
background: linear-gradient(to bottom, #2d5016 0%, #1a3d0a 100%);
padding: 30px 25px;
border-radius: 10px;
max-width: 1100px;
margin: 0 auto 10px;
position: relative;
min-height: 430px;
border: 2px solid rgba(255, 255, 255, 0.1);
}

.formation-line {
display: flex;
justify-content: center;
align-items: flex-end;
gap: 16px;
margin-bottom: 12px;
min-height: 110px;
flex-wrap: wrap;
}

.player-card {
width: 170px;
background: rgba(255, 255, 255, 0.95);
border-radius: 8px;
padding: 6px;
box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
position: relative;
transition: all 0.2s;
cursor: pointer;
}

.player-card:hover {
transform: translateY(-5px);
z-index: 10;
box-shadow: 0 6px 12px rgba(0, 0, 0, 0.5);
}

.player-card .badge {
width: 40px;
height: 40px;
object-fit: contain;
margin: 0 auto 3px;
display: block;
}

.player-card .name {
font-size: 12px;
font-weight: 800;
color: #000;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
background: #eee;
padding: 2px 4px;
border-radius: 3px;
margin: 2px 0;
text-align: center;
}

.player-card .info {
font-size: 10px;
color: #333;
display: flex;
justify-content: space-between;
padding: 0 4px;
font-weight: 600;
}

.card-btn {
position: absolute;
width: 22px;
height: 22px;
border-radius: 50%;
border: none;
color: white;
font-weight: bold;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
font-size: 14px;
transition: transform 0.1s;
}

.card-btn:hover {
transform: scale(1.15);
}

.btn-remove {
top: -8px;
left: -8px;
background: #ff4444;
}

.btn-swap {
top: -8px;
right: -8px;
background: #4444ff;
font-size: 11px;
}

.bench {
background: rgba(0, 0, 0, 0.2);
padding: 15px;
border-radius: 10px;
max-width: 1100px;
margin: 0 auto 30px;
}

.bench h3 {
text-align: center;
color: #fff;
margin-bottom: 12px;
}

.bench-slots {
display: flex;
justify-content: center;
gap: 25px;
flex-wrap: wrap;
}

.transfer-section {
background: rgba(255, 255, 255, 0.05);
padding: 20px;
border-radius: 10px;
}

.filters {
display: flex;
gap: 10px;
margin-bottom: 15px;
flex-wrap: wrap;
}

.filters input,
.filters select {
padding: 8px;
border-radius: 4px;
border: none;
flex: 1;
min-width: 150px;
}

.player-table {
background: #fff;
color: #000;
border-radius: 5px;
overflow: hidden;
max-height: 400px;
overflow-y: auto;
}

table {
width: 100%;
border-collapse: collapse;
font-size: 13px;
}

th {
background: var(--bg);
color: #fff;
padding: 10px;
text-align: left;
position: sticky;
top: 0;
}

td {
padding: 8px 10px;
border-bottom: 1px solid #eee;
}

tr:hover {
background: #f0f0f0;
cursor: pointer;
}

tr.selected {
background: #e6fffa;
}

.add-btn-row {
margin-top: 15px;
display: flex;
gap: 10px;
}

.add-btn-row button {
flex: 1;
padding: 12px;
border: none;
border-radius: 5px;
cursor: pointer;
font-weight: bold;
color: var(--bg);
}

.bench .add-btn-row {
display: flex;
justify-content: center;
margin: 25px auto 20px;
max-width: 500px;
border-top: 1px solid rgba(255, 255, 255, 0.1);
padding-top: 15px;
}

.message {
position: fixed;
bottom: 20px;
right: 20px;
padding: 15px 25px;
border-radius: 8px;
color: #fff;
font-weight: bold;
z-index: 3000;
display: none;
box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
}

.msg-success {
background: #00c853;
}

.msg-error {
background: #d50000;
}

.msg-info {
background: #2962ff;
}
</style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>FPL Team Planner</h1>
            <div class="bank-display">
                <span>Bank</span>
                <input type="number" id="bankInput" value="100.0" step="0.1" />
                <span>m</span>
            </div>
            <div class="price-toggle">
                <span>Show</span>
                <select id="priceModeSelect">
                    <option value="selling">Selling</option>
                    <option value="purchase">Purchase</option>
                    <option value="current">Current</option>
                </select>
            </div>
            <div class="header-actions">
                <button onclick="localSave()" class="header-btn save-btn">💾 Local Save</button>
                <button onclick="localLoad()" class="header-btn load-btn">📂 Local Load</button>
            </div>

            <button class="sidebar-toggle" onclick="toggleSidebarMenu()">Menu</button>

        </div>

        <div class="sidebar" id="sidebar">
            <h2>Manage Team</h2>

            <h3>Import</h3>
            <input type="text" id="importTeamId" placeholder="FPL Team ID e.g. 123456" />
            <button onclick="importTeam()">Import from FPL</button>

            <h3>Cloud Save</h3>
            <input type="text" id="saveTeamId" placeholder="Team ID to save as" />
            <input type="password" id="savePassword" placeholder="Create Password" />
            <button onclick="saveTeam()">Save Team</button>

            <h3>Cloud Load</h3>
            <input type="text" id="loadTeamId" placeholder="Saved Team ID" />
            <input type="password" id="loadPassword" placeholder="Password" />
            <button onclick="loadTeam()">Load Team</button>


            <div id="sideMsg" style="margin-top: 10px; font-size: 12px"></div>
        </div>

        <div class="gw-nav">
            <button onclick="changeGW(-1)" id="prevGW">← GW</button>
            <h2>Gameweek <span id="currentGWDisplay">1</span></h2>
            <button onclick="changeGW(1)" id="nextGW">GW →</button>
        </div>

        <div id="pitch" class="pitch"></div>

        <div class="bench">
            <h3>Bench</h3>
            <div id="benchSlots" class="bench-slots"></div>
        </div>

        <div class="add-btn-row">
            <button id="addToSquadBtn" style="background: #00ff87" onclick="addSelectedToSquad()">Add to squad</button>
            <button id="cancelTransferBtn" style="background: #ff4444; color: #fff" onclick="cancelTransfer()">Cancel
                transfer</button>
        </div>

        <div class="transfer-section">
            <h2>Transfers</h2>

            <div class="filters">
                <input type="text" id="searchName" placeholder="Name..." onkeyup="renderTable()" />
                <select id="filterPos" onchange="renderTable()">
                    <option value="">All Positions</option>
                    <option value="GK">Goalkeepers</option>
                    <option value="DEF">Defenders</option>
                    <option value="MID">Midfielders</option>
                    <option value="FWD">Forwards</option>
                </select>
                <select id="filterTeam" onchange="renderTable()">
                    <option value="">All Teams</option>
                </select>
                <input type="number" id="filterPrice" placeholder="Max Price" value="15.0" step="0.5"
                    onchange="renderTable()" />
            </div>

            <div class="player-table">
                <table id="pTable">
                    <thead>
                        <tr>
                            <th>Select</th>
                            <th>Name</th>
                            <th>Team</th>
                            <th>Pos</th>
                            <th>£</th>
                            <th style="text-align:center;">Next 3</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>


        </div>
    </div>

    <div id="toast" class="message"></div>

    <!-- Module Loader -->
    <script type="module">
        import './data.js';
        import './main.js';
        import './ui.js';
    </script>
</body>

</html>
