<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Fixtures Compact View Test</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/responsive.css" />
  <style>
    body {
      padding: 20px;
      background: #1a1a2e;
      color: #fff;
    }
    .test-container {
      max-width: 400px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="test-container">
    <h1>Team Fixtures - Compact View Test</h1>
    
    <div id="fixturesPanel"></div>
  </div>

  <script type="module">
    // Mock state and data
    const state = {
      teams: [
        { id: 1, name: 'Arsenal', code: 3 },
        { id: 2, name: 'Aston Villa', code: 7 },
        { id: 3, name: 'Bournemouth', code: 91 },
        { id: 4, name: 'Brentford', code: 94 },
        { id: 5, name: 'Brighton', code: 36 },
        { id: 6, name: 'Chelsea', code: 8 },
        { id: 7, name: 'Crystal Palace', code: 31 },
        { id: 8, name: 'Everton', code: 11 },
        { id: 9, name: 'Fulham', code: 54 },
        { id: 10, name: 'Man United', code: 1 },
      ]
    };

    let selectedTeamId = 1; // Arsenal

    // Mock fixtures data for Arsenal
    const mockFixtures = [
      { event: 22, team_h: 1, team_a: 2, kickoff_time: '2026-01-25T12:30:00Z' },
      { event: 23, team_h: 1, team_a: 3, kickoff_time: '2026-02-01T12:30:00Z' },
      { event: 24, team_h: 10, team_a: 1, kickoff_time: '2026-02-08T15:00:00Z' },
      { event: 25, team_h: 1, team_a: 4, kickoff_time: '2026-02-15T17:30:00Z' },
      { event: 26, team_h: 6, team_a: 1, kickoff_time: '2026-02-22T12:30:00Z' },
      { event: 27, team_h: 1, team_a: 5, kickoff_time: '2026-03-01T15:00:00Z' },
      { event: 28, team_h: 8, team_a: 1, kickoff_time: '2026-03-08T12:30:00Z' },
      { event: 29, team_h: 1, team_a: 9, kickoff_time: '2026-03-15T17:30:00Z' },
    ];

    function getTeam(teamId) {
      const t = state.teams.find(team => team.id === teamId);
      return {
        name: t ? t.name : '?',
        badge: t
          ? `https://resources.premierleague.com/premierleague/badges/70/t${t.code}.png`
          : ''
      };
    }

    function renderTeamFixtureRow(f, teamId) {
      const isHome = f.team_h === teamId;
      const opponentId = isHome ? f.team_a : f.team_h;
      const opponent = getTeam(opponentId);
      const venue = isHome ? 'H' : 'A';
      
      return `
        <div class="team-fixture-row" data-gw="${f.event || ''}">
          <div class="team-fixture-gw">GW${f.event || '?'}</div>
          <img class="team-fixture-badge" src="${opponent.badge}" alt="${opponent.name}" />
          <div class="team-fixture-opponent">${opponent.name}</div>
          <div class="team-fixture-venue ${isHome ? 'home' : 'away'}">${venue}</div>
        </div>
      `;
    }

    function renderFixtures() {
      const panel = document.getElementById('fixturesPanel');
      if (!panel) return;

      const sortedTeams = [...state.teams].sort((a, b) => a.name.localeCompare(b.name));
      const teamOptions = sortedTeams.map(team => 
        `<option value="${team.id}" ${team.id === selectedTeamId ? 'selected' : ''}>${team.name}</option>`
      ).join('');

      const headerHTML = `
        <div class="fixtures-header">
          <div class="fixtures-team-view-container">
            <button class="fixtures-view-toggle-btn" onclick="toggleView()">
              View by: Gameweek
            </button>
            <select class="fixtures-team-select" onchange="changeTeam(this.value)">
              ${teamOptions}
            </select>
          </div>
        </div>
      `;

      const fixturesContent = mockFixtures.map(f => renderTeamFixtureRow(f, selectedTeamId)).join('');
      const fixturesHTML = `<div class="fixtures-list-scrollable" id="fixturesListScrollable">${fixturesContent}</div>`;

      panel.innerHTML = headerHTML + fixturesHTML;
    }

    window.changeTeam = function(teamId) {
      selectedTeamId = parseInt(teamId, 10);
      renderFixtures();
    };

    window.toggleView = function() {
      alert('Toggle functionality - switches between Gameweek and Team view');
    };

    // Initialize
    renderFixtures();
  </script>
</body>
</html>
